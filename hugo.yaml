baseURL: "https://tgialac.github.io/"
title: Lac's World
theme: PaperMod

pagination:
  pagerSize: 8

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
enableEmoji: true

minify:
  disableXML: true

outputs:
  home:
    - HTML
    - RSS
    - JSON # needed for search

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 5
    - identifier: archives
      name: Archive
      url: /archives/
      weight: 10
    - identifier: search
      name: Search
      url: /search/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40

params:
  env: production
  title: Lac's World
  description: "Personal blog of Tran Gia Lac"
  keywords: [Blog, Portfolio]
  author: Tran Gia Lac
  DateFormat: "January 2, 2006"

  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  ShowToc: true
  TocOpen: false

  homeInfoParams:
    Title: "Welcome to Lac's World"
    Content: >
      Hi, I’m Lac. I write about what I learn, the systems I build,
      and the ideas worth keeping.

  socialIcons:
    - name: github
      url: "https://github.com/tgialac"
    - name: linkedin
      url: "https://www.linkedin.com/in/YOUR-LINKEDIN"
    - name: x
      url: "https://x.com/YOUR-X-HANDLE"
    - name: facebook
      url: "https://www.facebook.com/YOUR-FACEBOOK"
    - name: googlescholar
      url: "https://scholar.google.com/citations?user=YOUR-SCHOLAR-ID"
    - name: whatsapp
      url: "https://wa.me/YOUR-PHONE-NUMBER"
    - name: discord
      url: "https://discord.com/users/YOUR-DISCORD-ID"
    - name: email
      url: "mailto:work.trangialac@gmail.com"

  assets:
    favicon: "/favicon.svg"
    disableHLJS: true

  editPost:
    URL: "https://github.com/tgialac/tgialac.github.io/edit/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  cover:
    hidden: false
    hiddenInList: true
    hiddenInSingle: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
