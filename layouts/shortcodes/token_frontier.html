<figure class="token-figure token-frontier-figure">

    <title id="token-frontier-title">The marginal value of another token</title>

    <rect x="20" y="20" width="680" height="480" rx="28" class="token-figure-surface" />
    <text x="58" y="72" class="token-figure-kicker">THE OPERATING DECISION</text>

    <text x="630" y="454" text-anchor="end" class="frontier-axis-label">compute spend</text><text x="78" y="154" transform="rotate(-90 78 154)" class="frontier-axis-label">outcome value</text>
    <path d="M108 398 C168 302 240 238 314 204 C394 167 472 154 632 150" class="frontier-value" /><path d="M108 408 L632 184" class="frontier-cost" /><path d="M420 422 V173" class="frontier-threshold" /><circle cx="420" cy="186" r="8" class="frontier-stop-dot" />

  <figcaption>The budget is not a fixed maximum. It is a conditional right to spend while marginal expected value remains above full marginal cost.</figcaption>
