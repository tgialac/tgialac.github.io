{{- if or .Params.math .Site.Params.math }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="renderMathInElement(document.body, {throwOnError: false, strict: 'ignore', delimiters: [
    {left: '$$', right: '$$', display: true},
    {left: '$', right: '$', display: false},
    {left: '\\(', right: '\\)', display: false},
    {left: '\\[', right: '\\]', display: true}
  ]});"></script>
{{- end }}

<style>
.list {
  background: var(--theme);
}

.home-info {
  min-height: 0;
  padding: 1.5rem 0 2.5rem;
}

.home-info .entry-header h1 {
  font-size: 32px;
  letter-spacing: -0.02em;
}

.list .post-entry {
  margin-bottom: 20px;
  padding: 20px;
  background: var(--entry);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: background 0.2s ease;
}

.list .post-entry:hover,
.list .post-entry:focus-within {
  background: var(--tertiary);
}

.list .entry-header h2 {
  font-size: 28px;
  line-height: 1.25;
}

.list .entry-content {
  margin: 10px 0;
  font-size: 16px;
  line-height: 1.7;
  -webkit-line-clamp: 2;
}

.list .entry-footer {
  font-size: 14px;
}

.list .post-entry:hover .entry-header h2 {
  text-decoration: none;
}
.header .menu,
.header .menu a,
.header .menu a span {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.post-content .katex-display,
.post-content table {
  max-width: 100%;
  box-sizing: border-box;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
}

.post-content .katex-display {
  padding: 0.15rem 0 0.35rem;
  scrollbar-width: thin;
}

.post-content .katex-display::-webkit-scrollbar {
  height: 4px;
}

.post-content .katex-display::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 999px;
}

@media (max-width: 700px) {
  .post-content .katex-display {
    text-align: left;
  }

  .post-content table {
    display: block;
    width: 100%;
  }
}

</style>
