<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

{{- if or .Params.math .Site.Params.math }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="renderMathInElement(document.body, {delimiters: [
    {left: '$$', right: '$$', display: true},
    {left: '$', right: '$', display: false},
    {left: '\\(', right: '\\)', display: false},
    {left: '\\[', right: '\\]', display: true}
  ]});"></script>
{{- end }}

<style>
.list {
  background: var(--theme);
}

.home-info {
  min-height: 0;
  padding: 1.5rem 0 2.5rem;
}

.home-info .entry-header h1 {
  font-size: 32px;
  letter-spacing: -0.02em;
}

.list .post-entry {
  margin-bottom: 2.75rem;
  padding: 0;
  background: transparent;
  border: 0;
  border-radius: 0;
  transition: none;
}

.list .post-entry:hover,
.list .post-entry:focus-within {
  transform: none;
}

.list .entry-header h2 {
  font-size: 28px;
  line-height: 1.25;
}

.list .entry-content {
  margin: 10px 0;
  font-size: 16px;
  line-height: 1.7;
  -webkit-line-clamp: 4;
}

.list .entry-footer {
  font-size: 14px;
}

.list .post-entry:hover .entry-header h2 {
  text-decoration: underline;
  text-underline-offset: 0.2em;
}

/* Editorial typography and navigation inspired by Lil’Log. */
:root {
  --main-width: 740px;
  --nav-width: 800px;
  --header-height: 56px;
}

body {
  font-family: Lora, Georgia, serif;
  font-size: 16.5px;
  line-height: 1.65;
}

.header {
  background: #111;
}

.header .logo a,
.header .menu a,
.header .theme-toggle {
  color: #fff;
  font-family: "Open Sans", sans-serif;
}

.header .logo a {
  font-size: 25px;
  letter-spacing: -0.04em;
}

.header .menu a {
  font-size: 16px;
  font-weight: 400;
}

.header .menu .active {
  font-weight: 600;
  text-decoration-thickness: 1px;
}

.header .menu a:hover,
.header .logo a:hover {
  color: #e87555;
  text-decoration: none;
}

.list .main {
  padding-top: 34px;
}

.list .entry-header h2 {
  font-family: "Open Sans", sans-serif;
  font-size: 25px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.list .post-entry:hover .entry-header h2 {
  color: #e0491f;
  text-decoration: none;
}

.list .entry-content {
  color: var(--primary);
}

.entry-footer,
.post-meta,
.breadcrumbs {
  font-family: "Open Sans", sans-serif;
}

.post-title {
  font-family: Lora, Georgia, serif;
  font-size: 36px;
  letter-spacing: -0.025em;
}

.post-content h2,
.post-content h3,
.post-content h4 {
  font-family: "Open Sans", sans-serif;
}

.post-content a {
  border-bottom: 1px dotted #bbb;
  padding-bottom: 1px;
}

.post-content a:hover {
  color: #e0491f;
  border-bottom-style: solid;
  text-decoration: none;
}
</style>
