{{- if or .Params.math .Site.Params.math }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="renderMathInElement(document.body, {throwOnError: false, strict: 'ignore', delimiters: [
    {left: '$$', right: '$$', display: true},
    {left: '$', right: '$', display: false},
    {left: '\\(', right: '\\)', display: false},
    {left: '\\[', right: '\\]', display: true}
  ]});"></script>
{{- end }}

<style>
.list {
  background: var(--theme);
}

.home-info {
  min-height: 0;
  padding: 1.5rem 0 2.5rem;
}

.home-info .entry-header h1 {
  font-size: 32px;
  letter-spacing: -0.02em;
}

.list .post-entry {
  margin-bottom: 20px;
  padding: 20px;
  background: var(--entry);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: background 0.2s ease;
}

.list .post-entry:hover,
.list .post-entry:focus-within {
  background: var(--tertiary);
}

.list .entry-header h2 {
  font-size: 28px;
  line-height: 1.25;
}

.list .entry-content {
  margin: 10px 0;
  font-size: 20px;
  line-height: 1.7;
  -webkit-line-clamp: 2;
}

.list .entry-footer {
  font-size: 17px;
}

.list .post-entry:hover .entry-header h2 {
  text-decoration: none;
}
.header .menu,
.header .menu a,
.header .menu a span {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.post-content .katex-display,
.post-content table {
  max-width: 100%;
  box-sizing: border-box;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
}

.post-content .katex-display {
  padding: 0.15rem 0 0.35rem;
  scrollbar-width: thin;
}

.post-content .katex-display::-webkit-scrollbar {
  height: 4px;
}

.post-content .katex-display::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 999px;
}

@media (max-width: 700px) {
  .post-content .katex-display {
    text-align: left;
  }

  .post-content table {
    display: block;
    width: 100%;
  }
}

.token-figure {
  max-width: 760px;
  margin: 2rem auto 2.4rem;
  padding: 0.65rem;
  background: linear-gradient(145deg, var(--entry), var(--theme));
  border: 1px solid var(--border);
  border-radius: 20px;
}

.token-figure svg {
  display: block;
  width: 100%;
  height: auto;
}

.token-figure-surface {
  fill: var(--theme);
  stroke: var(--border);
  stroke-width: 1.5;
}

.token-figure-kicker {
  fill: #0ea5e9;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1.4px;
}

.token-figure-title {
  fill: var(--primary);
  font-size: 24px;
  font-weight: 650;
}

.frontier-subtitle {
  fill: var(--secondary);
  font-size: 16px;
}

.frontier-axis {
  fill: none;
  stroke: var(--border);
  stroke-width: 2;
}

.frontier-value,
.frontier-cost,
.frontier-threshold,
.frontier-worth {
  fill: none;
  stroke-linecap: round;
}

.frontier-value { stroke: #10b981; stroke-width: 5; }
.frontier-cost { stroke: #f97316; stroke-width: 4; }
.frontier-threshold { stroke: #0ea5e9; stroke-dasharray: 7 7; stroke-width: 2; }
.frontier-stop-dot { fill: #0ea5e9; }
.frontier-axis-label { fill: var(--secondary); font-size: 15px; }
.frontier-stop-label { fill: #0ea5e9; font-size: 15px; font-weight: 650; }
.frontier-value-label { fill: #10b981; font-size: 17px; font-weight: 650; }
.frontier-cost-label { fill: #f97316; font-size: 17px; font-weight: 650; }
.frontier-worth { stroke: #10b981; stroke-width: 3; }
.frontier-worth-label { fill: #10b981; font-size: 15px; font-weight: 650; }
.frontier-not-worth-label { fill: var(--secondary); font-size: 15px; }

@media (max-width: 700px) {
  .token-figure {
    margin: 1.5rem 0 2rem;
    padding: 0.3rem;
    border-radius: 14px;
  }
}

</style>
